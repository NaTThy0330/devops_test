apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alert-rules
data:
  alert-rules.yml: |
    groups:
      - name: devops-assignment
        rules:
          - alert: HighErrorRate
            expr: |
              sum(rate(http_requests_total{status=~"5.."}[5m]))
              /
              clamp_min(sum(rate(http_requests_total[5m])), 1)
              > 0.05
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "API error rate is above 5 percent"
          - alert: WorkerStalledJob
            expr: |
              sum(increase(worker_jobs_total[10m])) == 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Worker job counter has not increased for 10 minutes"
          - alert: PodCrashLooping
            expr: |
              increase(kube_pod_container_status_restarts_total[5m]) > 3
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "One or more pods are restarting rapidly"
